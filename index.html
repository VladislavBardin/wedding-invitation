<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Приглашение на свадьбу</title>
    <link rel="preload" as="image" href="./public/assets/main_bride_talking.png" />
    <link rel="preload" as="image" href="./public/assets/main_groom_talking.png" />
    <link rel="preload" as="image" href="./public/assets/main_background.png" />
    <link rel="preload" as="image" href="./public/assets/garden_bride_talking.png" />
    <link rel="preload" as="image" href="./public/assets/garden_groom_talking.png" />
    <link rel="preload" as="image" href="./public/assets/garden_background.png" />
    <link rel="preload" as="image" href="./public/assets/hall_desktop.png" />
    <link rel="preload" as="image" href="./public/assets/hall_talking.png" />
    <link rel="preload" as="image" href="./public/assets/hall_bride_talking.png" />
    <link rel="preload" as="image" href="./public/assets/hall_groom_talking.png" />
    <link rel="preload" as="image" href="./public/assets/hall_mobile.png" />
    <link rel="preload" as="image" href="./public/assets/intro_background.png" />
    <link rel="preload" as="image" href="./public/assets/envelope_closed.png" />
    <link rel="preload" as="image" href="./public/assets/envelope_open.png" />
    <link rel="preload" as="image" href="./public/assets/envelope_front.png" />
    <link rel="preload" as="image" href="./public/assets/invitation_card.png" />
    <link rel="preload" as="image" href="./public/assets/mobile_letter.png" />
    <link
      rel="preload"
      as="audio"
      href="./public/assets/audio/armor-instrumental.mp3"
      type="audio/mpeg"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="intro-active is-loading">
    <audio
      class="background-audio"
      src="./public/assets/audio/armor-instrumental.mp3"
      preload="auto"
      loop
    >
      <source src="./public/assets/audio/armor-instrumental.mp3" type="audio/mpeg" />
    </audio>

    <div class="site-loader" role="status" aria-live="polite">
      <div class="site-loader__content">
        <p class="site-loader__title">Загружаем приглашение</p>
        <div class="site-loader__bar" aria-hidden="true">
          <span class="site-loader__progress"></span>
        </div>
        <p class="site-loader__count">0%</p>
        <p class="site-loader__sound-hint">Для большего погружения включите звук</p>
      </div>
    </div>

    <div
      class="intro-envelope"
      role="button"
      tabindex="0"
      aria-label="Открыть приглашение"
    >
      <div class="intro-envelope__stage" aria-hidden="true">
        <img
          class="intro-envelope__image intro-envelope__image--open"
          src="./public/assets/envelope_open.png"
          alt=""
        />
        <img
          class="intro-envelope__card intro-envelope__card--desktop"
          src="./public/assets/invitation_card.png"
          alt=""
        />
        <img
          class="intro-envelope__card intro-envelope__card--mobile"
          src="./public/assets/mobile_letter.png"
          alt=""
        />
        <img
          class="intro-envelope__image intro-envelope__image--front"
          src="./public/assets/envelope_front.png"
          alt=""
        />
        <img
          class="intro-envelope__image intro-envelope__image--closed"
          src="./public/assets/envelope_closed.png"
          alt=""
        />
      </div>
      <p class="intro-envelope__hint">Нажмите чтобы продолжить</p>
    </div>

    <main>
      <section
        class="hero-scene is-bride-speaking"
        role="button"
        tabindex="0"
        aria-label="Невеста говорит. Нажмите, чтобы передать слово жениху."
        data-speaker="bride"
      >
        <div class="desktop-scene" aria-hidden="true">
          <div class="desktop-frame desktop-frame--bride"></div>
          <div class="desktop-frame desktop-frame--groom"></div>
        </div>

        <div class="mobile-scene" aria-hidden="true">
          <div class="mobile-background"></div>
          <img
            class="character character--groom"
            src="./public/assets/groom.png"
            alt=""
          />
          <img
            class="character character--bride"
            src="./public/assets/bride.png"
            alt=""
          />
        </div>

        <div class="dialog-box" aria-live="polite">
          <div class="dialog-text"></div>
        </div>
      </section>
    </main>
    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
